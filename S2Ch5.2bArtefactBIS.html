<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Neurotransmitter explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
<style>
  :root {
    --surface-page: #faf9f6;
    --surface-card: #ffffff;
    --surface-soft: #f1efe8;
    --text-primary: #1a1a1a;
    --text-secondary: #5f5e5a;
    --border: #d3d1c7;
    --border-strong: #b4b2a9;
    --accent-bg: #e6f1fb;
    --accent-border: #85b7eb;
    --radius: 8px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--surface-page);
    color: var(--text-primary);
    margin: 0;
    padding: 1.5rem 1rem 3rem;
    -webkit-text-size-adjust: 100%;
  }
  .wrap { max-width: 480px; margin: 0 auto; }
  h1 {
    font-size: 19px;
    font-weight: 500;
    margin: 0 0 0.3rem;
    line-height: 1.3;
  }
  .sub {
    font-size: 14px;
    color: var(--text-secondary);
    margin: 0 0 1.5rem;
    line-height: 1.5;
  }
  #nt-buttons {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
    margin-bottom: 1.25rem;
  }
  button {
    font-family: inherit;
    font-size: 14px;
    font-weight: 400;
    padding: 12px 14px;
    min-height: 44px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
    background: var(--surface-card);
    color: var(--text-primary);
    cursor: pointer;
    text-align: left;
    transition: background 0.1s ease, border-color 0.1s ease;
  }
  button:active { transform: scale(0.98); }
  button.active {
    background: var(--accent-bg);
    border-color: var(--accent-border);
    font-weight: 500;
  }
  .card {
    background: var(--surface-card);
    border: 0.5px solid var(--border);
    border-radius: 14px;
    padding: 1.25rem;
  }
  .label {
    font-size: 12px;
    color: var(--text-secondary);
    margin: 0 0 4px;
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }
  .role {
    font-size: 16px;
    margin: 0 0 1.25rem;
    line-height: 1.5;
  }
  .grid2 {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
    margin-bottom: 1.25rem;
  }
  .box {
    background: var(--surface-soft);
    border-radius: var(--radius);
    padding: 0.75rem;
  }
  .boxlabel {
    font-size: 12px;
    color: var(--text-secondary);
    margin: 0 0 6px;
    display: flex;
    align-items: center;
    gap: 4px;
    font-weight: 500;
  }
  .boxtext { font-size: 13px; margin: 0; line-height: 1.5; }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    background: var(--surface-soft);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 5px 11px;
    font-size: 13px;
  }
  @media (max-width: 360px) {
    .grid2 { grid-template-columns: 1fr; }
    #nt-buttons { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Neurotransmitter explorer</h1>
  <p class="sub">Tap a neurotransmitter to see its function, what happens when there's too little or too much, and which drugs affect it.</p>
  <div id="nt-buttons"></div>
  <div id="nt-detail"></div>
</div>

<script>
const NT = {
  dopamine: { name: "Dopamine", role: "Reward, motivation, pleasure, movement", low: "Reduced motivation, low mood, in severe cases linked to Parkinson's-type movement problems", high: "Euphoria, in some cases linked to psychosis-like symptoms", drugs: ["Alcohol", "Nicotine", "Cocaine", "Amphetamines", "Opioids"] },
  serotonin: { name: "Serotonin", role: "Mood, sleep, appetite, emotional regulation", low: "Linked to low mood and depression", high: "Agitation, confusion, rapid heart rate (rare)", drugs: ["Nicotine", "Psychedelics"] },
  gaba: { name: "GABA", role: "Calming signals, slows neural activity", low: "Anxiety, difficulty relaxing", high: "Sedation, slowed reactions, poor coordination", drugs: ["Alcohol", "Benzodiazepines"] },
  noradrenaline: { name: "Noradrenaline", role: "Alertness, attention, fight-or-flight", low: "Low energy, poor concentration", high: "Anxiety, racing heart, panic-like symptoms", drugs: ["Nicotine", "Cocaine", "Amphetamines"] },
  endorphins: { name: "Endorphins", role: "Natural pain relief, wellbeing", low: "Increased pain sensitivity, lower mood", high: "Euphoria, in overdose: dangerously slowed breathing", drugs: ["Alcohol", "Opioids"] },
  glutamate: { name: "Glutamate", role: "Stimulating signals, learning and memory", low: "Slowed thinking, poor memory formation", high: "Overstimulation, in extreme cases seizures", drugs: ["Alcohol (suppresses it)"] }
};

const btnWrap = document.getElementById('nt-buttons');
const detail = document.getElementById('nt-detail');
let active = 'dopamine';

function renderButtons() {
  btnWrap.innerHTML = '';
  Object.keys(NT).forEach(key => {
    const btn = document.createElement('button');
    btn.textContent = NT[key].name;
    if (key === active) btn.classList.add('active');
    btn.onclick = () => { active = key; render(); };
    btnWrap.appendChild(btn);
  });
}

function render() {
  renderButtons();
  const nt = NT[active];
  detail.innerHTML = `
    <div class="card">
      <p class="label">Function</p>
      <p class="role">${nt.role}</p>
      <div class="grid2">
        <div class="box">
          <p class="boxlabel"><i class="ti ti-arrow-down"></i>Too little</p>
          <p class="boxtext">${nt.low}</p>
        </div>
        <div class="box">
          <p class="boxlabel"><i class="ti ti-arrow-up"></i>Too much</p>
          <p class="boxtext">${nt.high}</p>
        </div>
      </div>
      <p class="label">Affected by</p>
      <div class="tags">
        ${nt.drugs.map(d => `<span class="tag">${d}</span>`).join('')}
      </div>
    </div>
  `;
}

render();
</script>
</body>
</html>
