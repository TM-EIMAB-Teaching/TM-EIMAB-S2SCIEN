<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neurotransmitter Explorer</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
<style>
  :root {
    --surface-1: #f4f3ee;
    --surface-2: #ffffff;
    --text-primary: #1a1a1a;
    --text-secondary: #5f5e5a;
    --border: #d3d1c7;
    --radius: 8px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #fafaf7;
    color: var(--text-primary);
    margin: 0;
    padding: 2rem 1rem;
  }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 600; margin: 0 0 1.5rem; }
  #nt-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.25rem; }
  button {
    font-family: inherit;
    font-size: 14px;
    padding: 8px 14px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
    background: var(--surface-2);
    cursor: pointer;
  }
  button:hover { background: var(--surface-1); }
  .card { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 12px; padding: 1.25rem; }
  .label { font-size: 13px; color: var(--text-secondary); margin: 0 0 4px; }
  .role { font-size: 15px; margin: 0 0 1rem; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1rem; }
  .box { background: var(--surface-1); border-radius: var(--radius); padding: 0.75rem; }
  .boxlabel { font-size: 12px; color: var(--text-secondary); margin: 0 0 4px; display: flex; align-items: center; gap: 4px; }
  .boxtext { font-size: 13px; margin: 0; }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { background: var(--surface-1); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 3px 10px; font-size: 13px; }
  @media (max-width: 480px) { .grid2 { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Neurotransmitter explorer</h1>
  <div id="nt-buttons"></div>
  <div id="nt-detail"></div>
</div>

<script>
const NT = {
  dopamine: {
    name: "Dopamine",
    role: "Reward, motivation, pleasure, movement",
    low: "Reduced motivation, low mood, in severe cases linked to Parkinson's-type movement problems",
    high: "Euphoria, in some cases linked to psychosis-like symptoms",
    drugs: ["Alcohol", "Nicotine", "Cocaine", "Amphetamines", "Opioids"]
  },
  serotonin: {
    name: "Serotonin",
    role: "Mood, sleep, appetite, emotional regulation",
    low: "Linked to low mood and depression",
    high: "Can cause agitation, confusion, rapid heart rate (serotonin syndrome, rare)",
    drugs: ["Nicotine", "Psychedelics (LSD, psilocybin)"]
  },
  gaba: {
    name: "GABA",
    role: "Calming signals, slows down neural activity",
    low: "Anxiety, difficulty relaxing, overactive alarm system",
    high: "Sedation, slowed reactions, poor coordination",
    drugs: ["Alcohol", "Benzodiazepines"]
  },
  noradrenaline: {
    name: "Noradrenaline",
    role: "Alertness, attention, fight-or-flight response",
    low: "Low energy, poor concentration",
    high: "Anxiety, racing heart, panic-like symptoms",
    drugs: ["Nicotine", "Cocaine", "Amphetamines"]
  },
  endorphins: {
    name: "Endorphins",
    role: "Natural pain relief, feelings of wellbeing",
    low: "Increased pain sensitivity, lower mood",
    high: "Euphoria, in overdose: dangerously slowed breathing",
    drugs: ["Alcohol", "Opioids"]
  },
  glutamate: {
    name: "Glutamate",
    role: "Stimulating signals, learning and memory",
    low: "Slowed thinking, poor memory formation",
    high: "Overstimulation, in extreme cases linked to seizures",
    drugs: ["Alcohol (suppresses it)"]
  }
};

const btnWrap = document.getElementById('nt-buttons');
const detail = document.getElementById('nt-detail');
let active = 'dopamine';

function renderButtons() {
  btnWrap.innerHTML = '';
  Object.keys(NT).forEach(key => {
    const nt = NT[key];
    const btn = document.createElement('button');
    btn.textContent = nt.name;
    if (key === active) {
      btn.style.background = '#e6f1fb';
      btn.style.fontWeight = '600';
      btn.style.borderColor = '#85b7eb';
    }
    btn.onclick = () => { active = key; render(); };
    btnWrap.appendChild(btn);
  });
}

function render() {
  renderButtons();
  const nt = NT[active];
  detail.innerHTML = `
    <div class="card">
      <p class="label">Function</p>
      <p class="role">${nt.role}</p>
      <div class="grid2">
        <div class="box">
          <p class="boxlabel"><i class="ti ti-arrow-down"></i>Too little</p>
          <p class="boxtext">${nt.low}</p>
        </div>
        <div class="box">
          <p class="boxlabel"><i class="ti ti-arrow-up"></i>Too much</p>
          <p class="boxtext">${nt.high}</p>
        </div>
      </div>
      <p class="label">Affected by</p>
      <div class="tags">
        ${nt.drugs.map(d => `<span class="tag">${d}</span>`).join('')}
      </div>
    </div>
  `;
}

render();
</script>
</body>
</html>
