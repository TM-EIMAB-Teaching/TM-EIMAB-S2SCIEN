
<h2 class="sr-only">Interactive explorer: tap a neurotransmitter to see its function, effects of too little or too much, and which drugs affect it</h2>
<div style="padding:1rem 0;">
<div id="nt-buttons" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.25rem;"></div>
<div id="nt-detail"></div>
</div>
<script>
const NT = {
  dopamine: {
    name: "Dopamine",
    color: "purple",
    role: "Reward, motivation, pleasure, movement",
    low: "Reduced motivation, low mood, in severe cases linked to Parkinson's-type movement problems",
    high: "Euphoria, in some cases linked to psychosis-like symptoms",
    drugs: ["Alcohol", "Nicotine", "Cocaine", "Amphetamines", "Opioids"]
  },
  serotonin: {
    name: "Serotonin",
    color: "teal",
    role: "Mood, sleep, appetite, emotional regulation",
    low: "Linked to low mood and depression",
    high: "Can cause agitation, confusion, rapid heart rate (serotonin syndrome, rare)",
    drugs: ["Nicotine", "Psychedelics (LSD, psilocybin)"]
  },
  gaba: {
    name: "GABA",
    color: "blue",
    role: "Calming signals, slows down neural activity",
    low: "Anxiety, difficulty relaxing, overactive alarm system",
    high: "Sedation, slowed reactions, poor coordination",
    drugs: ["Alcohol", "Benzodiazepines"]
  },
  noradrenaline: {
    name: "Noradrenaline",
    color: "coral",
    role: "Alertness, attention, fight-or-flight response",
    low: "Low energy, poor concentration",
    high: "Anxiety, racing heart, panic-like symptoms",
    drugs: ["Nicotine", "Cocaine", "Amphetamines"]
  },
  endorphins: {
    name: "Endorphins",
    color: "pink",
    role: "Natural pain relief, feelings of wellbeing",
    low: "Increased pain sensitivity, lower mood",
    high: "Euphoria, in overdose: dangerously slowed breathing",
    drugs: ["Alcohol", "Opioids"]
  },
  glutamate: {
    name: "Glutamate",
    color: "amber",
    role: "Stimulating signals, learning and memory",
    low: "Slowed thinking, poor memory formation",
    high: "Overstimulation, in extreme cases linked to seizures",
    drugs: ["Alcohol (suppresses it)"]
  }
};

const btnWrap = document.getElementById('nt-buttons');
const detail = document.getElementById('nt-detail');
let active = 'dopamine';

function renderButtons() {
  btnWrap.innerHTML = '';
  Object.keys(NT).forEach(key => {
    const nt = NT[key];
    const btn = document.createElement('button');
    btn.textContent = nt.name;
    const isActive = key === active;
    btn.style.cssText = isActive
      ? `background:var(--bg-${mapColor(nt.color)});color:var(--text-${mapColor(nt.color)});border-color:var(--border-${mapColor(nt.color)});font-weight:500;`
      : '';
    btn.onclick = () => { active = key; render(); };
    btnWrap.appendChild(btn);
  });
}

function mapColor(c) {
  const allowed = ['accent','danger','success','warning'];
  return allowed.includes(c) ? c : 'accent';
}

function render() {
  renderButtons();
  const nt = NT[active];
  detail.innerHTML = `
    <div style="background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;padding:1.25rem;">
      <p style="font-size:13px;color:var(--text-secondary);margin:0 0 4px;">Function</p>
      <p style="font-size:15px;margin:0 0 1rem;">${nt.role}</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem;">
        <div style="background:var(--surface-1);border-radius:var(--radius);padding:0.75rem;">
          <p style="font-size:12px;color:var(--text-secondary);margin:0 0 4px;display:flex;align-items:center;gap:4px;"><i class="ti ti-arrow-down" style="font-size:14px;" aria-hidden="true"></i>Too little</p>
          <p style="font-size:13px;margin:0;">${nt.low}</p>
        </div>
        <div style="background:var(--surface-1);border-radius:var(--radius);padding:0.75rem;">
          <p style="font-size:12px;color:var(--text-secondary);margin:0 0 4px;display:flex;align-items:center;gap:4px;"><i class="ti ti-arrow-up" style="font-size:14px;" aria-hidden="true"></i>Too much</p>
          <p style="font-size:13px;margin:0;">${nt.high}</p>
        </div>
      </div>
      <p style="font-size:13px;color:var(--text-secondary);margin:0 0 6px;">Affected by</p>
      <div style="display:flex;flex-wrap:wrap;gap:6px;">
        ${nt.drugs.map(d => `<span style="background:var(--surface-1);border:0.5px solid var(--border);border-radius:var(--radius);padding:3px 10px;font-size:13px;">${d}</span>`).join('')}
      </div>
    </div>
  `;
}

render();
</script>
